safe_bayesian_optimization_node:
  ros__parameters:
    opt:
      beta: 2.0
      lipshitz: 1.0
      f_max: 500.0
      subgoal_erosion: 0.4
      preference_order: ["g", "l", "e"]
      
    # Terrain map request parameters
    terrain_map:
      width: 200.0
      height: 200.0
      width_cells: 200
      height_cells: 200
      
    # Debug configuration
    debug:
      publish_debug_image: false

    robot:
      pose_topic: "spirit/current_pose"
      
    # Node configuration
    node:
      update_rate: 10.0  # Hz
      log_level: "info"
      enable_visualization: true

goal_point_publisher:
  ros__parameters:
    exploration_mode: false
