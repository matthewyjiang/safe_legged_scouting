safe_bayesian_optimization_node:
  ros__parameters:
    opt:
      beta: 2.0
      lipshitz: 1.0
      f_max: 500.0
      subgoal_erosion: 0.4
      preference_order: ["g", "l", "e"]
      update_on_measurement: true  # If true, update safe region on each measurement change; if false, update only after reaching subgoal
      expansion_score_k: 2.0  # Expansion score decay parameter: prob_expansion = 1 - exp(-k * expansion_score). Higher k = faster approach to 1.0
      goal_score_k: 10.0  # Goal score decay parameter: goal_score = exp(-k * (goal_distance + prev_subgoal_distance)) if goal exists, else exp(-k * prev_subgoal_distance). Higher k = faster decay with distance
      
    # Terrain map request parameters
    terrain_map:
      width: 200.0
      height: 200.0
      width_cells: 200
      height_cells: 200
      
    # Debug configuration
    debug:
      publish_debug_image: false

    robot:
      pose_topic: "spirit/current_pose"
      
    # Node configuration
    node:
      update_rate: 10.0  # Hz
      log_level: "info"
      enable_visualization: true
      
    # Topic whitelist for Foxglove visualization
    visualization:
      topic_whitelist:
        - "/frontier_goal_score_markers"
        - "/frontier_expansion_prob_markers"
        - "/frontier_overall_score_markers"

goal_point_publisher:
  ros__parameters:
    exploration_mode: false
